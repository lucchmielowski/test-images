name: Mirror Kyverno Test Images to GHCR

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, don't copy)"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "mirror.yaml"
      - ".github/workflows/mirror-images.yml"
      - ".github/actions/mirror/**"

permissions:
  packages: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          matrix=$(yq -o=json -I=0 '.sources[0].images' mirror.yaml)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  mirror:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        image: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Mirror
        uses: ./.github/actions/mirror
        with:
          source: dockerhub
          image: ${{ matrix.image }}
          target-owner: ${{ github.repository_owner }}
          dry-run: ${{ inputs.dry_run || 'false' }}
